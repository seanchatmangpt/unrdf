# UNRDF Sync Configuration for CodeManufactory Public O v2
# Usage: unrdf sync --config=codemanufactory.unrdf.toml

[project]
name = "codemanufactory"
version = "2.0.0"
description = "CodeManufactory public ontology v2 - deterministic code manufacturing system"

[ontology]
source = "/Users/sac/Downloads/codemanufactory-public-o-v2.ttl"
format = "turtle"

[generation]
output_dir = "./generated/codemanufactory"

# Rule 1: Generate MCP tool stubs from artifact kind concepts
[[generation.rules]]
name = "artifact-kinds"
description = "Generate scaffolding from CodeManufactory artifact kind concepts"
enabled = true
query = """
PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

SELECT ?concept ?label ?notation ?description
WHERE {
  ?concept a skos:Concept ;
           skos:prefLabel ?label ;
           skos:notation ?notation .
  OPTIONAL { ?concept skos:definition ?description }
}
ORDER BY ?notation
"""
template = "packages/cli/templates/scaffolding/sparql-query.njk"
output_file = "artifacts/kinds/{{ notation }}_kind.mjs"

# Rule 2: Generate SHACL shapes as validation modules
[[generation.rules]]
name = "shacl-shapes"
description = "Generate SHACL validation modules from ontology shapes"
enabled = true
query = """
PREFIX sh: <http://www.w3.org/ns/shacl#>
PREFIX schema: <https://schema.org/>

SELECT ?shape ?targetClass ?path ?severity ?description
WHERE {
  ?shape a sh:NodeShape .
  OPTIONAL { ?shape sh:targetClass ?targetClass }
  OPTIONAL {
    ?shape sh:property ?prop .
    ?prop sh:path ?path .
    OPTIONAL { ?prop sh:message ?description }
    OPTIONAL { ?prop sh:severity ?severity }
  }
}
ORDER BY ?targetClass ?path
"""
template = "packages/cli/templates/testing/integration-test.njk"
output_file = "validation/shacl_{{ targetClass | default('shared') }}_test.mjs"

# Rule 3: Generate semantic convention YAML from telemetry concepts
[[generation.rules]]
name = "telemetry-registry"
description = "Generate OTel semantic convention YAML from telemetry-mapping concepts"
enabled = true
query = """
PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

SELECT ?concept ?label ?notation ?definition
WHERE {
  ?concept a skos:Concept ;
           skos:prefLabel ?label ;
           skos:notation ?notation .
  FILTER (REGEX(?notation, "telemetry") || REGEX(?notation, "observability") || REGEX(?notation, "receipt"))
  OPTIONAL { ?concept skos:definition ?definition }
}
ORDER BY ?notation
"""
template = "packages/cli/templates/config/github-actions-ci.njk"
output_file = "semconv/{{ notation }}_registry.yaml"

# Rule 4: Generate benchmark infrastructure from benchmark concepts
[[generation.rules]]
name = "benchmark-infrastructure"
description = "Generate benchmark runners from benchmark-related concepts"
enabled = true
query = """
PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

SELECT ?concept ?label ?notation ?definition
WHERE {
  ?concept a skos:Concept ;
           skos:prefLabel ?label ;
           skos:notation ?notation .
  FILTER (REGEX(?notation, "benchmark"))
  OPTIONAL { ?concept skos:definition ?definition }
}
ORDER BY ?notation
"""
template = "packages/cli/templates/testing/unit-test.njk"
output_file = "benchmarks/{{ notation }}_benchmark.mjs"

# Rule 5: Generate participant surface MCP tools
[[generation.rules]]
name = "mcp-surfaces"
description = "Generate MCP participant surface tool registrations"
enabled = true
query = """
PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
PREFIX schema: <https://schema.org/>

SELECT ?concept ?label ?notation ?definition ?actionName ?targetProp
WHERE {
  ?concept a skos:Concept ;
           skos:prefLabel ?label ;
           skos:notation ?notation .
  FILTER (REGEX(?notation, "participant-surface") || REGEX(?notation, "mcp"))

  OPTIONAL { ?concept skos:definition ?definition }
  OPTIONAL {
    ?shape sh:targetSubjectsOf ?action .
    ?shape sh:path ?targetProp .
    ?action a schema:potentialAction .
    ?action schema:name ?actionName .
  }
}
ORDER BY ?notation
"""
template = "packages/cli/templates/scaffolding/service-init.njk"
output_file = "mcp-tools/{{ notation }}_tool.mjs"

# Rule 6: Generate OpenAPI spec from schema:Action shapes
[[generation.rules]]
name = "openapi-spec"
description = "Generate OpenAPI spec from schema:potentialAction definitions"
enabled = true
query = """
PREFIX schema: <https://schema.org/>
PREFIX sh: <http://www.w3.org/ns/shacl#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?action ?actionName ?actionDesc ?targetClass ?path
WHERE {
  ?action a schema:potentialAction .
  OPTIONAL { ?action schema:name ?actionName }
  OPTIONAL { ?action schema:description ?actionDesc }
  OPTIONAL { ?action schema:target ?targetClass }
  OPTIONAL {
    ?shape sh:targetSubjectsOf ?action .
    ?shape sh:path ?path .
  }
}
ORDER BY ?actionName
"""
template = "packages/cli/templates/api/openapi-spec.njk"
output_file = "api/openapi-codemanufactory.yaml"

# Rule 7: Generate documentation from all concept schemes
[[generation.rules]]
name = "documentation"
description = "Generate documentation from ontology concept schemes"
enabled = true
query = """
PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
PREFIX dcterms: <http://purl.org/dc/terms/>

SELECT ?scheme ?title ?concept ?label ?notation ?definition
WHERE {
  ?scheme a skos:ConceptScheme ;
           dcterms:title ?title ;
           skos:hasTopConcept ?concept .
  ?concept skos:prefLabel ?label ;
           skos:notation ?notation .
  OPTIONAL { ?concept skos:definition ?definition }
}
ORDER BY ?title ?notation
"""
template = "packages/cli/templates/docs/readme.njk"
output_file = "docs/{{ title | lower | replace(' ', '-') }}-reference.md"

# Rule 8: Generate Docker/deploy configs from infrastructure concepts
[[generation.rules]]
name = "infrastructure"
description = "Generate infrastructure configs from deployment-related concepts"
enabled = true
query = """
PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

SELECT ?concept ?label ?notation ?definition
WHERE {
  ?concept a skos:Concept ;
           skos:prefLabel ?label ;
           skos:notation ?notation .
  FILTER (REGEX(?notation, "cloud") || REGEX(?notation, "desktop") || REGEX(?notation, "browser") || REGEX(?notation, "edge"))
  OPTIONAL { ?concept skos:definition ?definition }
}
ORDER BY ?notation
"""
template = "packages/cli/templates/config/dockerfile.njk"
output_file = "infra/{{ notation }}_Dockerfile"

# Rule 9: Generate CI/CD from process concepts (breed, compile, project, etc.)
[[generation.rules]]
name = "ci-pipeline"
description = "Generate CI/CD pipeline from process lifecycle concepts"
enabled = true
query = """
PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

SELECT ?concept ?label ?notation ?definition
WHERE {
  ?concept a skos:Concept ;
           skos:prefLabel ?label ;
           skos:notation ?notation .
  FILTER (REGEX(?notation, "breed") || REGEX(?notation, "compile") || REGEX(?notation, "project") || REGEX(?notation, "receipt") || REGEX(?notation, "proof"))
  OPTIONAL { ?concept skos:definition ?definition }
}
ORDER BY ?notation
"""
template = "packages/cli/templates/config/gitlab-ci.njk"
output_file = "ci/{{ notation }}_pipeline.yml"
