# UNRDF Daemon-specific Semantic Conventions
# Extends registry/mcp.yaml for MCP tool attributes

groups:
  - id: registry.daemon
    type: attribute_group
    display_name: UNRDF Daemon Attributes
    brief: Daemon-specific scheduling and cluster operations
    attributes:
      - id: daemon.trigger.type
        type: string
        stability: stable
        brief: Type of trigger that initiated the operation
        examples: ['cron', 'interval', 'reactive', 'event']

      - id: daemon.operation.id
        type: string
        stability: stable
        brief: Unique identifier for the daemon operation

      - id: daemon.operation.type
        type: string
        stability: stable
        brief: Type of daemon operation
        examples: ['scheduled', 'reactive', 'event']

      - id: daemon.operation.duration_ms
        type: int
        stability: stable
        brief: Duration of the operation in milliseconds

      - id: daemon.cluster.member_id
        type: string
        stability: stable
        brief: Unique identifier for cluster member

      - id: daemon.cluster.is_leader
        type: boolean
        stability: stable
        brief: Whether this node is the cluster leader

      - id: daemon.cluster.raft_state
        type: string
        stability: stable
        brief: Current Raft state of the cluster
        examples: ['leader', 'follower', 'candidate']
