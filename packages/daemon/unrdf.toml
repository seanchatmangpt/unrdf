# UNRDF Daemon Configuration
# Minimal config for Groq MCP integration tests

[daemon]
name = "unrdf-daemon"
version = "26.4.23"

[groq]
# Groq API configuration for LLM integration
# Requires GROQ_API_KEY environment variable
model = "llama-3.3-70b-versatile"
temperature = 0.7
max_tokens = 4096

[mcp]
enabled = true
port = 7015
tools = [
  "onto_validate",
  "onto_query",
  "onto_reason",
  "onto_import",
  "onto_export",
  "onto_shapes",
  "onto_classes",
  "onto_properties",
  "onto_individuals",
  "onto_prefixes",
  "onto_namespaces",
  "onto_construct",
  "onto_update",
  "onto_explain",
  "onto_stats"
]
