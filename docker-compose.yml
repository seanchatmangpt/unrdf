# Production Docker Compose configuration for UNRDF v6
# Includes application, monitoring, and supporting services

version: '3.8'

services:
  # Main UNRDF application
  unrdf:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: unrdf:6.0.0-rc.1
    container_name: unrdf-app
    restart: unless-stopped
    ports:
      - '3000:3000' # API
      - '9090:9090' # Metrics
      - '8080:8080' # Health check
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - PROMETHEUS_PORT=9090
      - HEALTH_CHECK_PORT=8080
      - API_PORT=3000
    env_file:
      - .env.production
    volumes:
      - unrdf-data:/app/data
      - unrdf-logs:/app/logs
    networks:
      - unrdf-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: unrdf-prometheus
    restart: unless-stopped
    ports:
      - '9091:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - unrdf-network
    depends_on:
      - unrdf

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.2.2
    container_name: unrdf-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    networks:
      - unrdf-network
    depends_on:
      - prometheus

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: unrdf-otel-collector
    restart: unless-stopped
    command: ['--config=/etc/otel-collector-config.yaml']
    volumes:
      - ./monitoring/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
      - '8888:8888' # Prometheus metrics
      - '13133:13133' # Health check
    networks:
      - unrdf-network

  # AlertManager for alert routing
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: unrdf-alertmanager
    restart: unless-stopped
    ports:
      - '9093:9093'
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager/config.yml:/etc/alertmanager/config.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - unrdf-network

  # Node Exporter for system metrics
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: unrdf-node-exporter
    restart: unless-stopped
    ports:
      - '9100:9100'
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - unrdf-network

  # Tempo (Distributed Trace Storage)
  tempo:
    image: grafana/tempo:2.7.1
    container_name: unrdf-tempo
    restart: unless-stopped
    command: ['tempo', '-config.file=/etc/tempo.yaml']
    volumes:
      - ./otel/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - '4319:4319' # OTLP gRPC (Tempo native receiver)
      - '3200:3200' # Tempo API
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - unrdf-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3200/status']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MinIO (S3-compatible Object Storage for Tempo)
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: unrdf-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Console
    networks:
      - unrdf-network
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MinIO Bucket Setup (runs once to create tempo-traces bucket)
  minio-setup:
    image: minio/mc:latest
    container_name: unrdf-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/tempo-traces;
      mc anonymous set download local/tempo-traces;
      exit 0;
      "
    networks:
      - unrdf-network
    restart: 'no'

  # HotROD Demo App (Synthetic Trace Generation)
  example-app:
    image: jaegertracing/example-hotrod:1.62.0
    container_name: unrdf-hotrod
    restart: unless-stopped
    command: ['all']
    ports:
      - '8082:8080' # HotROD frontend (8080 conflicts with unrdf health check)
      - '8083:8081' # HotROD customer service
    environment:
      - OTEL_SERVICE_NAME=hotrod
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
    networks:
      - unrdf-network
    depends_on:
      - otel-collector

  # Pyroscope (Continuous Profiling)
  pyroscope:
    image: grafana/pyroscope:1.10.1
    container_name: unrdf-pyroscope
    restart: unless-stopped
    command: ['server']
    volumes:
      - pyroscope-data:/data
    ports:
      - '4040:4040'
    networks:
      - unrdf-network

volumes:
  unrdf-data:
    driver: local
  unrdf-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
  tempo-data:
    driver: local
  minio-data:
    driver: local
  pyroscope-data:
    driver: local

networks:
  unrdf-network:
    driver: bridge
