# Grafana Alloy configuration — feature-equivalent replacement for Promtail
# Adds trace OTLP forwarding capability (logs + metrics + traces in one agent)
#
# Drop-in for: promtail.yaml + trace gateway to Tempo

prometheus:
  wal_directory: /var/lib/alloy/data
  global:
    scrape_interval: 15s

loki:
  positions_directory: /var/lib/alloy/data/loki
  configs:
    - name: default
      clients:
        - url: http://loki:3100/loki/api/v1/push
      scrape_configs:
        # Collect logs from all Docker containers in the otel compose project
        - job_name: docker
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              refresh_interval: 5s
              filters:
                - name: label
                  values: ['com.docker.compose.project=otel']
          relabel_configs:
            - source_labels: ['__meta_docker_container_name']
              regex: '/(.*)'
              target_label: 'container'
            - source_labels: ['__meta_docker_container_log_stream']
              target_label: 'stream'
          pipeline_stages:
            - json:
                expressions:
                  trace_id: traceID
                  level: level
                  msg: msg
            - labels:
                trace_id:
                level:
                container:

        # Collect OTEL Collector logs (stdout from docker)
        - job_name: otel-collector
          static_configs:
            - targets:
                - localhost
              labels:
                job: otel-collector
                __path__: /var/log/otel-collector/*.log

traces:
  configs:
    - name: default
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      exporters:
        otlp:
          endpoint: tempo:4319
          tls:
            insecure: true
