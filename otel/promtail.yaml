server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collect logs from all Docker containers
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ['com.docker.compose.project=otel']
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
    pipeline_stages:
      - docker: {}
      - labeldrop:
          - __meta_docker_container_log_stream
          - __meta_docker_container_id
          - __meta_docker_compose_project
          - __meta_docker_compose_service

  # Collect OTEL Collector logs (stdout from docker)
  - job_name: otel-collector
    static_configs:
      - targets:
          - localhost
        labels:
          job: otel-collector
          __path__: /var/log/otel-collector/*.log
