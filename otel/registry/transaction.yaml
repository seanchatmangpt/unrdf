groups:
  - id: registry.unrdf.transaction
    type: attribute_group
    display_name: UNRDF Transaction Attributes
    brief: >
      Attributes for UNRDF RDF store transaction lifecycle instrumentation.
    attributes:
      - id: unrdf.transaction.id
        type: string
        stability: stable
        brief: The UUID identifier of the transaction.
        examples: ['7c9e6679-7425-40de-944b-e07fc1f90ae7']

      - id: unrdf.transaction.operation_count
        type: int
        stability: stable
        brief: >
          Number of RDF operations (add, delete, update) performed within
          the transaction before commit or rollback.
        examples: [1, 10, 500]

      - id: unrdf.transaction.result
        type:
          members:
            - id: committed
              value: 'committed'
              stability: stable
              brief: Transaction committed successfully.
            - id: rolled_back
              value: 'rolled-back'
              stability: stable
              brief: Transaction rolled back due to error or explicit abort.
            - id: aborted
              value: 'aborted'
              stability: stable
              brief: Transaction aborted due to conflict.
        stability: stable
        brief: The outcome of the transaction.

      - id: unrdf.transaction.isolation_level
        type:
          members:
            - id: read_committed
              value: 'read-committed'
              stability: stable
              brief: Reads see data committed before the query began.
            - id: snapshot
              value: 'snapshot'
              stability: stable
              brief: Reads see a consistent snapshot at transaction start.
            - id: serializable
              value: 'serializable'
              stability: stable
              brief: Full serializable isolation (highest consistency).
        stability: stable
        brief: The isolation level of the transaction.
