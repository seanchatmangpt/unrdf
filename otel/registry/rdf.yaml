groups:
  - id: registry.unrdf.rdf
    type: attribute_group
    display_name: UNRDF RDF Operation Attributes
    brief: >
      Attributes for RDF store operations including SPARQL queries, quad
      manipulation, and graph management.
    attributes:
      - id: unrdf.rdf.operation
        type:
          members:
            - id: add
              value: 'add'
              stability: stable
              brief: Adding one or more quads to the store.
            - id: delete
              value: 'delete'
              stability: stable
              brief: Deleting one or more quads from the store.
            - id: query_ask
              value: 'query-ask'
              stability: stable
              brief: Executing a SPARQL ASK query.
            - id: query_select
              value: 'query-select'
              stability: stable
              brief: Executing a SPARQL SELECT query.
            - id: query_construct
              value: 'query-construct'
              stability: stable
              brief: Executing a SPARQL CONSTRUCT query.
            - id: query_describe
              value: 'query-describe'
              stability: stable
              brief: Executing a SPARQL DESCRIBE query.
            - id: update
              value: 'update'
              stability: stable
              brief: Executing a SPARQL UPDATE operation.
            - id: load
              value: 'load'
              stability: stable
              brief: Loading RDF data from a file or stream.
            - id: dump
              value: 'dump'
              stability: stable
              brief: Serializing the store to a file or stream.
            - id: validate
              value: 'validate'
              stability: stable
              brief: Running SHACL validation against the store.
        stability: stable
        brief: The type of RDF store operation being performed.

      - id: unrdf.rdf.store_backend
        type:
          members:
            - id: memory
              value: 'memory'
              stability: stable
              brief: In-memory RDF store (no persistence).
            - id: oxigraph
              value: 'oxigraph'
              stability: stable
              brief: Oxigraph persistent backend (Rust/LMDB).
            - id: remote
              value: 'remote'
              stability: stable
              brief: Remote SPARQL endpoint.
        stability: stable
        brief: The storage backend used by the RDF store.

      - id: unrdf.rdf.graph_name
        type: string
        stability: stable
        brief: >
          The IRI of the named graph being operated on. Empty string or absent
          for the default graph.
        examples:
          - 'http://example.org/graph/trades'
          - 'http://example.org/provenance'

      - id: unrdf.rdf.quad_count
        type: int
        stability: stable
        brief: >
          Number of RDF quads involved in the operation (added, deleted,
          or returned by a query).
        examples: [1, 100, 50000]

      - id: unrdf.rdf.format
        type:
          members:
            - id: turtle
              value: 'text/turtle'
              stability: stable
              brief: Turtle RDF serialization.
            - id: nquads
              value: 'application/n-quads'
              stability: stable
              brief: N-Quads RDF serialization.
            - id: ntriples
              value: 'application/n-triples'
              stability: stable
              brief: N-Triples RDF serialization.
            - id: trig
              value: 'application/trig'
              stability: stable
              brief: TriG RDF serialization.
            - id: jsonld
              value: 'application/ld+json'
              stability: stable
              brief: JSON-LD RDF serialization.
        stability: stable
        brief: MIME type of the RDF serialization format used for load or dump.

      - id: unrdf.rdf.sparql_query_length
        type: int
        stability: stable
        brief: >
          Length in characters of the SPARQL query string. Useful for
          distinguishing simple vs. complex queries in latency analysis.
        examples: [32, 256, 4096]
