groups:
  - id: registry.unrdf.cli
    type: attribute_group
    display_name: UNRDF CLI Attributes
    brief: >
      Attributes for UNRDF command-line interface command instrumentation.
    attributes:
      - id: unrdf.cli.command
        type: string
        stability: stable
        brief: The top-level CLI command being executed.
        examples: ['hooks', 'graph', 'sparql', 'shacl', 'daemon']

      - id: unrdf.cli.subcommand
        type: string
        stability: stable
        brief: >
          The subcommand being executed within the top-level CLI command.
          Empty string if no subcommand was provided.
        examples:
          - 'execute'
          - 'define'
          - 'template'
          - 'evaluate-condition'
          - 'list-conditions'
          - 'receipts'

      - id: unrdf.cli.exit_code
        type: int
        stability: stable
        brief: The process exit code produced by the CLI command.
        examples: [0, 1, 2]

      - id: unrdf.cli.args_count
        type: int
        stability: stable
        brief: Number of positional and option arguments passed to the command.
        examples: [0, 2, 5]

      - id: unrdf.cli.store_file
        type: string
        stability: stable
        brief: >
          Path to the RDF store file passed via `--store`. Recorded as-is;
          not normalized or resolved to an absolute path.
        examples: ['/tmp/test.ttl', 'data/graph.n3', 'store.trig']

      - id: unrdf.cli.config_file
        type: string
        stability: stable
        brief: >
          Path to the JSON configuration file passed via `--config`.
        examples: ['/tmp/hooks.json', 'config/hooks.json']

      - id: unrdf.cli.output_format
        type:
          members:
            - id: json
              value: 'json'
              stability: stable
              brief: Output formatted as JSON.
            - id: text
              value: 'text'
              stability: stable
              brief: Human-readable text output.
            - id: ttl
              value: 'ttl'
              stability: stable
              brief: Turtle RDF serialization.
            - id: nquads
              value: 'nquads'
              stability: stable
              brief: N-Quads RDF serialization.
        stability: stable
        brief: The output format requested via `--format` or `--output`.
