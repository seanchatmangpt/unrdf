# OTEL + Weaver Observability Stack for UNRDF
#
# Services:
#   - otel-collector  : Receives OTLP traces/metrics/logs, routes to backends
#   - tempo           : Trace storage (S3 backend via MinIO)
#   - prometheus      : Metrics scraping, storage, and alerting
#   - grafana         : Dashboards for traces, metrics, logs, profiles
#   - loki            : Log aggregation and query engine
#   - promtail        : Log shipper (Docker container logs)
#   - pyroscope       : Continuous profiling (CPU, memory, goroutine)
#   - alertmanager    : Alert routing and notification
#   - minio           : S3-compatible object storage for Tempo
#   - example-app     : HotROD demo app (reference trace generation)
#   - pm4py           : Process mining on OTEL logs (Jupyter notebook)
#
# Usage:
#   cd otel
#   docker compose up -d
#   open http://localhost:3000    (Grafana — traces, metrics, logs, profiles)
#   open http://localhost:9090    (Prometheus)
#   open http://localhost:3100    (Loki)
#   open http://localhost:4040    (Pyroscope)
#   open http://localhost:9001    (MinIO Console — minioadmin/minioadmin)
#   open http://localhost:8080    (HotROD Demo App)
#   open http://localhost:8888    (PM4Py Jupyter — token: unrdf)
#   ./run-process-mining.sh     (Run process mining analysis)
#
# Teardown:
#   docker compose down -v

services:
  # ── OpenTelemetry Collector ──────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    container_name: unrdf-otel-collector
    command: ['--config=/etc/otelcollector/config.yaml']
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcollector/config.yaml:ro
    ports:
      - '4317:4317' # OTLP gRPC (ingest from daemon/sidecar)
      - '4318:4318' # OTLP HTTP
      - '8889:8889' # Prometheus metrics exposed by collector
      - '13133:13133' # Health check
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ── Tempo (Trace Storage) ─────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.7.1
    container_name: unrdf-tempo
    command: ['tempo', '-config.file=/etc/tempo.yaml']
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - '4319:4319' # OTLP gRPC (Tempo native receiver)
      - '3200:3200' # Tempo API
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3200/status']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Prometheus (Metrics Backend) ─────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: unrdf-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - '9090:9090'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9090/-/healthy']
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Grafana (Dashboards + Trace UI) ──────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: unrdf-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_FEATURE_TOGGLES_ENABLE=pyroscopeIntegration
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    ports:
      - '3000:3000'
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Loki (Log Aggregation) ───────────────────────────────────────
  loki:
    image: grafana/loki:3.3.2
    container_name: unrdf-loki
    command: ['-config.file=/etc/loki/config.yaml']
    volumes:
      - ./loki.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - '3100:3100'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3100/ready']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Promtail (Log Shipper) ───────────────────────────────────────
  promtail:
    image: grafana/promtail:3.3.2
    container_name: unrdf-promtail
    command: ['-config.file=/etc/promtail/config.yaml']
    volumes:
      - ./promtail.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ── Pyroscope (Continuous Profiling) ─────────────────────────────
  pyroscope:
    image: grafana/pyroscope:1.10.1
    container_name: unrdf-pyroscope
    command: ['server']
    volumes:
      - pyroscope-data:/data
    ports:
      - '4040:4040'
    restart: unless-stopped

  # ── Alertmanager (Alert Routing) ─────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: unrdf-alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    ports:
      - '9093:9093'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9093/-/healthy']
      interval: 15s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible Object Storage for Tempo) ───────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: unrdf-minio
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Console
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MinIO Bucket Setup (runs once) ───────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: unrdf-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/tempo-traces;
      mc mb --ignore-existing local/tempo-blocks;
      mc anonymous set download local/tempo-traces;
      mc anonymous set download local/tempo-blocks;
      exit 0;
      "
    restart: 'no'

  # ── HotROD Demo App (Reference Trace Generation) ─────────────────
  example-app:
    image: jaegertracing/example-hotrod:1.62.0
    container_name: unrdf-hotrod
    command: ['all']
    environment:
      - OTEL_SERVICE_NAME=hotrod
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
    ports:
      - '8080:8080'
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped

  # ── PM4Py Process Mining ──────────────────────────────────────────
  pm4py:
    build: ./pm4py
    container_name: unrdf-pm4py
    command: ['--hours', '24', '--limit', '1000']
    environment:
      - LOKI_URL=http://loki:3100
      - TEMPO_URL=http://tempo:3200
      - PROMETHEUS_URL=http://prometheus:9090
    volumes:
      - pm4py-output:/app/output
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    restart: 'no'

volumes:
  tempo-data:
  prometheus-data:
  grafana-data:
  loki-data:
  pyroscope-data:
  alertmanager-data:
  minio-data:
  pm4py-output:
