groups:
  - name: unrdf_log_alerts
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate({container=~".*unrdf.*"} |= "error" [5m])) by (container)
          / sum(rate({container=~".*unrdf.*"} [5m])) by (container)
          > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High error rate in {{ $labels.container }}'
          description: '{{ $labels.container }} has >10% error logs in the last 5m'
      - alert: ServiceDown
        expr: |
          sum(rate({container=~".*unrdf.*"} [10m])) by (container) == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: 'No logs from {{ $labels.container }}'
          description: '{{ $labels.container }} has produced zero logs in 10m'
