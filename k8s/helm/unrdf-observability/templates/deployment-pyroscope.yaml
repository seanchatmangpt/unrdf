apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-%s" (include "unrdf-observability.fullname" .) "pyroscope" }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "unrdf-observability.componentLabels" . | nindent 4 }}
  {{- $component := "pyroscope" }}
spec:
  replicas: {{ .Values.pyroscope.replicas }}
  selector:
    matchLabels:
      {{- include "unrdf-observability.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ $component }}
  template:
    metadata:
      labels:
        {{- include "unrdf-observability.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: {{ $component }}
        {{- include "unrdf-observability.podSecurityLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ printf "%s-%s" (include "unrdf-observability.fullname" .) $component }}
      securityContext:
        {{- toYaml .Values.security.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $component }}
          image: "{{ .Values.pyroscope.imageRepo }}:{{ .Values.pyroscope.imageTag }}"
          securityContext:
            {{- toYaml (index .Values "pyroscope" "securityContext" | default .Values.security.containerSecurityContext) | nindent 12 }}
          args:
            - server
          ports:
            - name: http
              containerPort: 4040
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/pyroscope
          resources:
            {{- toYaml .Values.pyroscope.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 4040
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 4040
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ printf "%s-pyroscope-data" (include "unrdf-observability.fullname" .) }}
