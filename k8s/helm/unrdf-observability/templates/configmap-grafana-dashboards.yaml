apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-grafana-dashboards" (include "unrdf-observability.fullname" .) }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "unrdf-observability.componentLabels" . | nindent 4 }}
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards
          foldersFromFilesStructure: false

  service-graph.json: |
{{ .Files.Get "dashboards/service-graph.json" | indent 4 }}

  trace-to-metrics.json: |
{{ .Files.Get "dashboards/trace-to-metrics.json" | indent 4 }}

  unrdf-otel.json: |
{{ .Files.Get "dashboards/unrdf-otel.json" | indent 4 }}
