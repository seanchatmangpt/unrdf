{{- $am := printf "%s-alertmanager" (include "unrdf-observability.fullname" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-loki" (include "unrdf-observability.fullname" .) }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "unrdf-observability.componentLabels" . | nindent 4 }}
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096

    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    analytics:
      reporting_enabled: false

    ruler:
      enable_alertmanager_v2: true
      alertmanager_url: http://{{ $am }}:9093
      storage:
        type: local
        local:
          directory: /loki/rules
      rule_path: /loki/rules
