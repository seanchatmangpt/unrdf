apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ printf "%s-promtail" (include "unrdf-observability.fullname" .) }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "unrdf-observability.componentLabels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-promtail" (include "unrdf-observability.fullname" .) }}
  labels:
    {{- include "unrdf-observability.componentLabels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-promtail" (include "unrdf-observability.fullname" .) }}
  labels:
    {{- include "unrdf-observability.componentLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "%s-promtail" (include "unrdf-observability.fullname" .) }}
subjects:
  - kind: ServiceAccount
    name: {{ printf "%s-promtail" (include "unrdf-observability.fullname" .) }}
    namespace: {{ .Values.namespace }}
