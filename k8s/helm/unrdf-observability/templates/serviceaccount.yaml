{{- $components := dict "prometheus" "prometheus" "grafana" "grafana" "otelCollector" "otel-collector" "alertmanager" "alertmanager" "tempo" "tempo" "loki" "loki" "minio" "minio" "pyroscope" "pyroscope" "nodeExporter" "node-exporter" "exampleApp" "example-app" "unrdf" "unrdf" }}
{{- range $valKey, $component := $components }}
{{- $valMap := index $.Values $valKey }}
{{- if or (not (hasKey $valMap "enabled")) $valMap.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "unrdf-observability.fullname" $ }}-{{ $component }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "unrdf-observability.labels" $ | nindent 4 }}
  {{- with $.Values.security.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
