{{- $grafana := printf "%s-grafana" (include "unrdf-observability.fullname" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-alertmanager" (include "unrdf-observability.fullname" .) }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "unrdf-observability.componentLabels" . | nindent 4 }}
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          group_wait: 0s
          repeat_interval: 5m

    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://{{ $grafana }}:3000/api/alertmanager/grafana/receiver'
            send_resolved: true

      - name: 'critical'
        webhook_configs:
          - url: 'http://{{ $grafana }}:3000/api/alertmanager/grafana/receiver'
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'service']
