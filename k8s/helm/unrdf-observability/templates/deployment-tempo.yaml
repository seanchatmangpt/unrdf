apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-%s" (include "unrdf-observability.fullname" .) "tempo" }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "unrdf-observability.componentLabels" . | nindent 4 }}
  {{- $component := "tempo" }}
spec:
  replicas: {{ .Values.tempo.replicas }}
  selector:
    matchLabels:
      {{- include "unrdf-observability.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ $component }}
  template:
    metadata:
      labels:
        {{- include "unrdf-observability.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: {{ $component }}
        {{- include "unrdf-observability.podSecurityLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ printf "%s-%s" (include "unrdf-observability.fullname" .) $component }}
      securityContext:
        {{- toYaml .Values.security.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $component }}
          image: "{{ .Values.tempo.imageRepo }}:{{ .Values.tempo.imageTag }}"
          securityContext:
            {{- toYaml (index .Values "tempo" "securityContext" | default .Values.security.containerSecurityContext) | nindent 12 }}
          args:
            - -config.file=/etc/tempo/tempo.yaml
          ports:
            - name: http
              containerPort: 3200
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4319
              protocol: TCP
            - name: otlp-http
              containerPort: 4320
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
              readOnly: true
            - name: data
              mountPath: /var/tempo
          resources:
            {{- toYaml .Values.tempo.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        - name: config
          configMap:
            name: {{ printf "%s-tempo" (include "unrdf-observability.fullname" .) }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ printf "%s-tempo-data" (include "unrdf-observability.fullname" .) }}
