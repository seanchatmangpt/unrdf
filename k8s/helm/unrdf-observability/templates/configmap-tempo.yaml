{{- $minio := printf "%s-minio" (include "unrdf-observability.fullname" .) }}
{{- $prom := printf "%s-prometheus" (include "unrdf-observability.fullname" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-tempo" (include "unrdf-observability.fullname" .) }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "unrdf-observability.componentLabels" . | nindent 4 }}
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4319
            http:
              endpoint: 0.0.0.0:4320

    storage:
      trace:
        backend: s3
        wal:
          path: /var/tempo/wal
        s3:
          bucket: tempo-traces
          endpoint: {{ $minio }}:9000
          access_key: minioadmin
          secret_key: minioadmin
          insecure: true
        local:
          path: /var/tempo/traces
        pool:
          max_workers: 100
          queue_depth: 10000

    compactor:
      compaction:
        block_retention: 720h

    metrics_generator:
      processor:
        service_graphs:
          dimensions:
            - service.name
            - service.version
        span_metrics:
          dimensions:
            - service.name
            - service.version
      storage:
        path: /var/tempo/generator-wal
        remote_write:
          - url: http://{{ $prom }}:9090/api/v1/write
            send_exemplars: true
