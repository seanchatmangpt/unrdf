{{- $fullname := include "unrdf-observability.fullname" . }}
{{- $ns := .Values.namespace }}

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}-prometheus-data
  namespace: {{ $ns }}
  labels:
    {{- include "unrdf-observability.componentLabels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: {{ .Values.storage.prometheus }}
---
