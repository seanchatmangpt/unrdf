# UNRDF Sync Configuration for CodeManufactory → BusinessOS RevOps Integration
# Usage: unrdf sync --config=codemanufactory-businessos-revops.toml
#
# Integration: CodeManufactory artifacts → BusinessOS purchasing deals
# Purpose: Automated RevOps workflow for code artifact procurement
# Compliance: SOC2, GDPR, SOX procurement controls
#
# Architecture: SELECT queries return named variable bindings that map
# directly to Nunjucks template variables. Each row becomes an iteration
# context in the template with {{ variableName }} access.

[project]
name = "codemanufactory-businessos-revops"
version = "1.0.0"
description = "CodeManufactory to BusinessOS RevOps purchasing integration"

[ontology]
# CodeManufactory ontology (schema-level)
source = "/Users/sac/Downloads/codemanufactory-public-o-v2.ttl"
format = "turtle"

# BusinessOS RevOps integration
[[ontology.additional]]
source = "/Users/sac/chatmangpt/BusinessOS/ontologies/revops-code-purchase.ttl"
format = "turtle"

[generation]
output_dir = "./generated/businessos-revops"

# ============================================================================
# RULE 1: Generate BusinessOS Deal Records from CodeManufactory Artifacts
# ============================================================================
# Template: /Users/sac/ostar/templates/fibo-deal.njk
# Expected variables: dealId, dealName, dealDesc, price, artifactType, created

[[generation.rules]]
name = "businessos-deal-from-artifact"
description = "Generate BusinessOS deal (FIBO) for CodeManufactory artifact purchase"
enabled = true
query = """
PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
PREFIX dcterms: <http://purl.org/dc/terms/>

SELECT ?artifactName ?artifactType ?dealId ?dealName ?dealDesc ?price ?created
WHERE {
  ?scheme a skos:ConceptScheme ;
           dcterms:title "CodeManufactory artifact kind scheme" ;
           skos:hasTopConcept ?artifact .
  ?artifact skos:prefLabel ?artifactName ;
             skos:notation ?artifactType .
  BIND(CONCAT("d-cmf-", REPLACE(LCASE(STR(?artifactName)), " ", "-"), "-2026") AS ?dealId)
  BIND(CONCAT("CodeManufactory ", STR(?artifactName), " Purchase") AS ?dealName)
  BIND(CONCAT("Purchase of ", STR(?artifactName), " artifact from CodeManufactory pipeline") AS ?dealDesc)
  BIND(CONCAT("5000 + LOC pricing") AS ?price)
  BIND(STR(NOW()) AS ?created)
}
ORDER BY ?artifactName
"""
template = "/Users/sac/ostar/templates/fibo-deal.njk"
output_file = "businessos/deals/{{ dealId | replace('d-cmf-', '') | replace('-2026', '') }}_deal.ttl"
mode = "overwrite"

# ============================================================================
# RULE 2: Generate RevOps Purchase Workflow State Machine
# ============================================================================
# Template: /Users/sac/ostar/templates/elixir-gen-server.njk
# Expected variables: workflowId, workflowLabel, timeout, retries
# Strategy: Single-row result from VALUES + BIND

[[generation.rules]]
name = "revops-purchase-workflow"
description = "Generate Elixir GenServer for RevOps purchase workflow (WvdA-compliant)"
enabled = true
query = """
SELECT ?workflowId ?workflowLabel ?stages ?timeout ?retries
WHERE {
  VALUES (?workflowId ?workflowLabel ?stages ?timeout ?retries) {
    ("wf-cmf-purchase" "CodeManufactory Purchase Workflow" "request,approval,procurement,delivery,acceptance,payment" "2592000" "3")
  }
}
"""
template = "/Users/sac/ostar/templates/elixir-gen-server.njk"
output_file = "businessos/workflows/{{ workflowId | snakeCase }}_workflow.ex"
mode = "overwrite"

# ============================================================================
# RULE 3: Generate MCP Tools for RevOps Operations
# ============================================================================
# Template: /Users/sac/ostar/templates/mcp-tool-registration.njk
# Expected variables: operation, toolName, toolDescription, app_name
# Strategy: VALUES provides all tool definitions, output_file iterates per row

[[generation.rules]]
name = "revops-mcp-tools"
description = "Generate MCP tool registration for RevOps operations (create-purchase, approve-deal, etc.)"
enabled = true
query = """
SELECT ?operation ?toolName ?toolDescription ?app_name
WHERE {
  VALUES (?operation ?toolName ?toolDescription ?app_name) {
    ("create_purchase_request" "Create Purchase Request" "Create new RevOps purchase request for code artifact" "codemanufactory-revops")
    ("approve_purchase" "Approve Purchase" "Manager approval for purchase request" "codemanufactory-revops")
    ("trigger_manufacturing" "Trigger Manufacturing" "Trigger CodeManufactory pipeline execution" "codemanufactory-revops")
    ("verify_delivery" "Verify Delivery" "Verify artifact meets quality gates" "codemanufactory-revops")
    ("process_payment" "Process Payment" "Process payment to CodeManufactory" "codemanufactory-revops")
  }
}
"""
template = "/Users/sac/ostar/templates/mcp-tool-registration.njk"
output_file = "businessos/mcp-tools/{{ operation | snakeCase }}_tool.mjs"
mode = "overwrite"

# ============================================================================
# RULE 4: Generate Quality Metrics for RevOps Process
# ============================================================================
# Template: /Users/sac/ostar/templates/quality-metrics.njk
# Expected variables: metricName, app_name, metricType, process
# Strategy: VALUES provides all metric definitions, output_file iterates per row

[[generation.rules]]
name = "revops-quality-metrics"
description = "Generate quality metrics (DPMO, Sigma, cycle time) for RevOps purchasing"
enabled = true
query = """
SELECT ?metricName ?app_name ?metricType ?process ?target ?unit
WHERE {
  VALUES (?process ?metricType ?target ?unit ?metricName ?app_name) {
    ("purchase_workflow" "dpmo" "3500" "defects_per_million" "Purchase Workflow DPMO" "codemanufactory-revops")
    ("purchase_approval" "cycle_time_hours" "24" "hours" "Approval Cycle Time" "codemanufactory-revops")
    ("artifact_delivery" "sigma" "5" "sigma_level" "Delivery Sigma Level" "codemanufactory-revops")
    ("payment_processing" "accuracy" "99.9" "percent" "Payment Accuracy" "codemanufactory-revops")
  }
}
"""
template = "/Users/sac/ostar/templates/quality-metrics.njk"
output_file = "businessos/quality/{{ process | snakeCase }}_{{ metricType | snakeCase }}_metric.ex"
mode = "overwrite"

# ============================================================================
# RULE 5: Generate OpenTelemetry Semantic Conventions for RevOps
# ============================================================================
# Template: /Users/sac/ostar/templates/otel-semconv-generator.njk
# Expected variables: app_name
# Strategy: This template is self-contained (all data hardcoded in template body).
# Query exists to satisfy sync pipeline requirement but template ignores results.

[[generation.rules]]
name = "revops-otel-semconv"
description = "Generate OTel semantic conventions for RevOps span attributes"
enabled = true
query = """
SELECT ?app_name
WHERE {
  VALUES (?app_name) { ("codemanufactory-revops") }
}
"""
template = "/Users/sac/ostar/templates/otel-semconv-generator.njk"
output_file = "businessos/otel/semconv/revops_attributes.yaml"
mode = "overwrite"
